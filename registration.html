<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width; initial-scale:1.0">
        <title>REGISTRATION</title>
        <link rel="stylesheet" href="./css/normalize.css">
        <link rel="stylesheet" href="./css/style.css">
        
    </head>

    <body> 
        <div class="overlay">
            <div class="modal">
                <a  href="index.html" class="close-btn">x</a>

                <div class="tabs">
                    <span>Login</span>
                    <span style="color:rgb(168, 164, 164)">|</span>
                    <span class="active">Register</span>
                </div>

                <p>Enter your email and password to register.</p>

                <form>
                    <input type="text" required placeholder="Username">
                    <input type="email" required placeholder="Enter your Email address">
                    <input type="password" minlength="6" maxlength="18" required placeholder="Password">
                    <input type="tel" minlength="13" maxlength="13" required placeholder="Your telefon number">

                    <button type="submit">Register</button>
                </form>
                <div class="divider">
                    <span>or Register with</span>
                </div>
                <div class="buttons">
                <button class="google-button"> <img src="img/g-logo.png" alt="google"> Continue with Google</button>
                <button class="facebook-button"> <img src="img/Facebook_f_logo_(2019).svg" alt="facebook"> Continue with Facebook</button>
                </div>
            </div>
        </div>


    </body>















</html>
